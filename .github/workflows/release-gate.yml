name: Release Gate

on:
  push:
    tags: ["v*"]

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Tag matches manifests and CHANGELOG
        run: python3 scripts/execforge.py release-check --tag "${GITHUB_REF_NAME}"
